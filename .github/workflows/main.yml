name: Build Open GApps

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2  # Removed submodules option

    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        distribution: 'adopt'
        java-version: '11'

    - name: Install required packages
      run: sudo apt-get update && sudo apt-get install -y wget unzip

    - name: Download Android SDK Command Line Tools
      run: |
        wget https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip -O android-sdk.zip
        unzip android-sdk.zip -d android-sdk
        mkdir -p $HOME/android-sdk/cmdline-tools
        mv android-sdk/cmdline-tools $HOME/android-sdk/cmdline-tools/latest

    - name: Set up Android SDK
      run: |
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
      env:
        ANDROID_SDK_ROOT: $HOME/android-sdk
        PATH: $PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools

    - name: Verify Android SDK tools
      run: |
        aapt version
        apksigner --version
        zipalign -v
      env:
        ANDROID_SDK_ROOT: $HOME/android-sdk
        PATH: $PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools

    - name: Sync Submodules
      run: |
        git submodule init
        git submodule update

    - name: Download APK sources
      run: |
        ./download_sources.sh --shallow

    - name: Build Open GApps
      run: |
        make

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4.5.0
      with:
        name: OpenGApps-Build
        path: output/
