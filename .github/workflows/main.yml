name: Build Open GApps

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        distribution: 'adopt'
        java-version: '11'

    - name: Install required packages
      run: |
        choco install wget unzip git
      shell: pwsh

    - name: Check PATH variable
      run: echo $env:PATH
      shell: pwsh

    - name: Download and Set up Android SDK Command Line Tools
      run: |
        wget https://dl.google.com/android/repository/commandlinetools-win-8512546_latest.zip -OutFile android-sdk.zip
        mkdir $env:USERPROFILE\android-sdk\cmdline-tools\latest
        unzip android-sdk.zip -d $env:USERPROFILE\android-sdk\cmdline-tools\latest
        Move-Item "$env:USERPROFILE\android-sdk\cmdline-tools\latest\cmdline-tools\*" "$env:USERPROFILE\android-sdk\cmdline-tools\latest\"
        Remove-Item "$env:USERPROFILE\android-sdk\cmdline-tools\latest\cmdline-tools"
      shell: pwsh

    - name: Set up Android SDK
      run: |
        $env:ANDROID_SDK_ROOT="$env:USERPROFILE\android-sdk"
        $env:PATH="$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin;$env:ANDROID_SDK_ROOT\platform-tools;$env:PATH"
        echo y | $env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\sdkmanager --licenses
        $env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3"
      shell: pwsh

    - name: Verify Android SDK tools
      run: |
        $env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\aapt version
        $env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\apksigner --version
        $env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\zipalign -v
      shell: pwsh

    - name: Sync Submodules
      run: |
        git submodule init
        git submodule update
      shell: pwsh

    - name: Download APK sources
      run: .\download_sources.ps1 --shallow
      shell: pwsh

    - name: Build Open GApps
      run: make
      env:
        ANDROID_SDK_ROOT: $env:USERPROFILE\android-sdk
        PATH: $env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin;$env:ANDROID_SDK_ROOT\platform-tools;$env:PATH
      shell: pwsh

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4.5.0
      with:
        name: OpenGApps-Build
        path: output\
