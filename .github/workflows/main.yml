name: Build Open GApps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'  # Changed from 'adopt' to 'temurin' (AdoptOpenJDK's new name)
        java-version: '17'       # Updated to Java 17 LTS
        cache: 'gradle'         # Enable caching for better performance

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.2.2
      with:
        cmdline-tools-version: 'latest'
        packages: 'build-tools;30.0.3 platform-tools'
        accept-android-sdk-licenses: true

    - name: Verify Android tools
      run: |
        which aapt
        which zipalign
        which apksigner

    - name: Sync submodules
      run: |
        git submodule update --init --recursive
        ./download_sources.sh --shallow

    - name: Build Open GApps
      run: make
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Archive build artifacts
      uses: actions/upload-artifact@v4.5.0
      with:
        name: open-gapps
        path: out/
