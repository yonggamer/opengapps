name: Build Open GApps

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v2
      with:
        distribution: 'adopt'
        java-version: '17'

    - name: Cache Android SDK
      uses: actions/cache@v2
      with:
        path: ${{ runner.tool_cache }}/android-sdk
        key: ${{ runner.os }}-android-sdk
        restore-keys: |
          ${{ runner.os }}-android-sdk

    - name: Install required packages
      run: |
        choco install unzip git
      shell: pwsh

    - name: Check PATH variable
      run: echo $env:PATH
      shell: pwsh

    - name: Download and Set up Android SDK Command Line Tools
      run: |
        if (!(Test-Path -Path "$env:RUNNER_TOOL_CACHE/android-sdk")) {
          # Correct URL to download the Android SDK command line tools using Invoke-WebRequest
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/commandlinetools-win-8512546_latest.zip" -OutFile "android-sdk.zip"
          # Create the directory for the command line tools
          mkdir $env:RUNNER_TOOL_CACHE\android-sdk\cmdline-tools\latest
          # Unzip the downloaded file into the created directory
          Expand-Archive -Path "android-sdk.zip" -DestinationPath "$env:RUNNER_TOOL_CACHE\android-sdk\cmdline-tools\latest"
          # Move the extracted files to the correct location
          Move-Item "$env:RUNNER_TOOL_CACHE\android-sdk\cmdline-tools\latest\cmdline-tools\*" "$env:RUNNER_TOOL_CACHE\android-sdk\cmdline-tools\latest\"
          # Remove the now-empty cmdline-tools directory
          Remove-Item "$env:RUNNER_TOOL_CACHE\android-sdk\cmdline-tools\latest\cmdline-tools"
        }
      shell: pwsh

    - name: Set up Android SDK
      shell: pwsh
      run: |
        Set-Item -Path Env:ANDROID_SDK_ROOT -Value "$env:RUNNER_TOOL_CACHE\android-sdk"
        Set-Item -Path Env:PATH -Value "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin;$env:ANDROID_SDK_ROOT\platform-tools;$env:PATH"
        Start-Process -FilePath "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\sdkmanager.bat" -ArgumentList "--licenses" -NoNewWindow -Wait
        Start-Process -FilePath "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\sdkmanager.bat" -ArgumentList "platform-tools", "platforms;android-30", "build-tools;30.0.3" -NoNewWindow -Wait

    - name: Verify Android SDK tools
      run: |
        # Debugging: Print environment variables
        echo "ANDROID_SDK_ROOT: $env:ANDROID_SDK_ROOT"
        echo "PATH: $env:PATH"

        # Check if aapt.exe exists
        if (Test-Path -Path "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\aapt.exe") {
          $aapt = "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\aapt.exe"
          & $aapt version
        } else {
          Write-Error "aapt.exe not found at $env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\aapt.exe"
        }

        # Check if apksigner.bat exists
        if (Test-Path -Path "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\apksigner.bat") {
          $apksigner = "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\apksigner.bat"
          & $apksigner --version
        } else {
          Write-Error "apksigner.bat not found at $env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\apksigner.bat"
        }

        # Check if zipalign.exe exists
        if (Test-Path -Path "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\zipalign.exe") {
          $zipalign = "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\zipalign.exe"
          & $zipalign -v
        } else {
          Write-Error "zipalign.exe not found at $env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\zipalign.exe"
        }
      shell: pwsh

    - name: Sync Submodules
      run: |
        git submodule init
        git submodule update
      shell: pwsh

    - name: Download APK sources
      run: .\download_sources.ps1 --shallow
      shell: pwsh

    - name: Build Open GApps
      run: make
      env:
        ANDROID_SDK_ROOT: ${{ runner.tool_cache }}/android-sdk
        PATH: ${{ runner.tool_cache }}/android-sdk/cmdline-tools/latest/bin:${{ runner.tool_cache }}/android-sdk/platform-tools:${{ runner.tool_cache }}/android-sdk
        JAVA_HOME: C:\hostedtoolcache\windows\Java_Adopt_jdk\17.0.1-9\x64
      shell: pwsh

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4.5.0
      with:
        name: OpenGApps-Build
        path: output\
