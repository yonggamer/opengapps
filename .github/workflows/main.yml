name: Build Open GApps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.2.2
      with:
        cmdline-tools-version: 'latest'
        packages: 'build-tools;30.0.3 platform-tools'
        accept-android-sdk-licenses: true

    - name: Install Android SDK Tools
      run: |
        sdkmanager --install "platform-tools" "build-tools;30.0.3"
        echo "$ANDROID_HOME/build-tools/30.0.3" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

    - name: Verify Android tools installation
      run: |
        echo "Checking aapt version:"
        aapt version
        echo "Checking apksigner location:"
        which apksigner
        echo "Checking zipalign location:"
        which zipalign

    - name: Sync submodules
      run: |
        git submodule update --init --recursive
        ./download_sources.sh --shallow

    - name: Build Open GApps
      run: |
        # Print some debug information
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "PATH: $PATH"
        # Run make with verbose output
        make VERBOSE=1
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        PATH: ${{ env.ANDROID_HOME }}/build-tools/30.0.3:${{ env.ANDROID_HOME }}/platform-tools:${{ env.PATH }}

    - name: Archive build artifacts
      uses: actions/upload-artifact@v4.5.0
      with:
        name: open-gapps
        path: out/
