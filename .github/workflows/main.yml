name: Build Open GApps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Install essential dependencies
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk
        sudo apt install -y android-sdk
        sudo apt install -y android-sdk-platform-tools
        sudo apt install -y android-sdk-build-tools
        sudo apt install -y make
        sudo apt install -y coreutils
        sudo apt install -y build-essential
      env:
        PATH: /usr/lib/android-sdk/build-tools/30.0.3:/usr/lib/android-sdk/platform-tools:/usr/bin:/bin:/usr/sbin:/sbin

    - name: Verify essential tools
      run: |
        echo "Checking ls command:"
        which ls || echo "ls command not found"
        echo "Checking make command:"
        which make || echo "make command not found"
        echo "Checking aapt version:"
        aapt version || echo "aapt command not found"
        echo "Checking apksigner location:"
        which apksigner || echo "apksigner command not found"
        echo "Checking zipalign location:"
        which zipalign || echo "zipalign command not found"
      env:
        PATH: /usr/lib/android-sdk/build-tools/30.0.3:/usr/lib/android-sdk/platform-tools:/usr/bin:/bin:/usr/sbin:/sbin

    - name: Set up environment
      run: |
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "API=30" >> $GITHUB_ENV
        echo "VARIANT=stock" >> $GITHUB_ENV
        echo "RELEASE_TYPE=beta" >> $GITHUB_ENV
      env:
        PATH: /usr/lib/android-sdk/build-tools/30.0.3:/usr/lib/android-sdk/platform-tools:/usr/bin:/bin:/usr/sbin:/sbin

    - name: Sync submodules
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git submodule update --init --recursive
        ./download_sources.sh --shallow
      env:
        PATH: /usr/lib/android-sdk/build-tools/30.0.3:/usr/lib/android-sdk/platform-tools:/usr/bin:/bin:/usr/sbin:/sbin

    - name: Prepare output directories
      run: |
        mkdir -p out/
        mkdir -p logs/

    - name: Build Open GApps
      run: |
        # Debug information
        echo "Current directory: $(pwd)"
        echo "Checking PATH: $PATH"
        echo "Directory contents: $(ls -la || echo "ls command failed")"
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "Environment variables:"
        env || echo "env command failed"
        # Build with specific architecture and API level
        make ARCH=$ARCH API=$API VARIANT=$VARIANT || echo "make command failed"
      env:
        ANDROID_HOME: /usr/lib/android-sdk
        PATH: /usr/lib/android-sdk/build-tools/30.0.3:/usr/lib/android-sdk/platform-tools:/usr/bin:/bin:/usr/sbin:/sbin:$PATH
        TMPDIR: /tmp
        USE_CCACHE: 1
        CCACHE_DIR: /tmp/ccache

    - name: List build directory contents
      run: |
        echo "Listing contents of build directory"
        ls -la /home/runner/work/opengapps/opengapps/build/arm/19/ || echo "build directory not found"

    - name: Archive build artifacts
      uses: actions/upload-artifact@v4.5.0
      with:
        name: open-gapps-${{ env.ARCH }}-${{ env.API }}-${{ env.VARIANT }}
        path: /home/runner/work/opengapps/opengapps/build/
