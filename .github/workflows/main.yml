name: Build Open GApps

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        distribution: 'adopt'
        java-version: '11'

    - name: Install required packages
      run: |
        choco install unzip git
      shell: pwsh

    - name: Check PATH variable
      run: echo $env:PATH
      shell: pwsh

    - name: Download and Set up Android SDK Command Line Tools
      run: |
        # Correct URL to download the Android SDK command line tools using Invoke-WebRequest
        Invoke-WebRequest -Uri "https://dl.google.com/android/repository/commandlinetools-win-8512546_latest.zip" -OutFile "android-sdk.zip"
        # Create the directory for the command line tools
        mkdir $env:USERPROFILE\android-sdk\cmdline-tools\latest
        # Unzip the downloaded file into the created directory
        Expand-Archive -Path "android-sdk.zip" -DestinationPath "$env:USERPROFILE\android-sdk\cmdline-tools\latest"
        # Move the extracted files to the correct location
        Move-Item "$env:USERPROFILE\android-sdk\cmdline-tools\latest\cmdline-tools\*" "$env:USERPROFILE\android-sdk\cmdline-tools\latest\"
        # Remove the now-empty cmdline-tools directory
        Remove-Item "$env:USERPROFILE\android-sdk\cmdline-tools\latest\cmdline-tools"
      shell: pwsh

    - name: Set up Android SDK
      shell: pwsh
      run: |
        Set-Item -Path Env:ANDROID_SDK_ROOT -Value "$env:USERPROFILE\android-sdk"
        Set-Item -Path Env:PATH -Value "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin;$env:ANDROID_SDK_ROOT\platform-tools;$env:PATH"
        Start-Process -FilePath "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\sdkmanager.bat" -ArgumentList "--licenses" -Wait
        Start-Process -FilePath "$env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\sdkmanager.bat" -ArgumentList "platform-tools", "platforms;android-30", "build-tools;30.0.3" -Wait

    - name: Verify Android SDK tools
      run: |
        $aapt = Join-Path -Path $env:ANDROID_SDK_ROOT -ChildPath 'cmdline-tools\latest\bin\aapt.exe'
        $apksigner = Join-Path -Path $env:ANDROID_SDK_ROOT -ChildPath 'cmdline-tools\latest\bin\apksigner.bat'
        $zipalign = Join-Path -Path $env:ANDROID_SDK_ROOT -ChildPath 'cmdline-tools\latest\bin\zipalign.exe'
        & $aapt version
        & $apksigner --version
        & $zipalign -v
      shell: pwsh

    - name: Sync Submodules
      run: |
        git submodule init
        git submodule update
      shell: pwsh

    - name: Download APK sources
      run: .\download_sources.ps1 --shallow
      shell: pwsh

    - name: Build Open GApps
      run: make
      env:
        ANDROID_SDK_ROOT: $env:USERPROFILE\android-sdk
        PATH: $env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin;$env:ANDROID_SDK_ROOT\platform-tools;$env:PATH
      shell: pwsh

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4.5.0
      with:
        name: OpenGApps-Build
        path: output\
