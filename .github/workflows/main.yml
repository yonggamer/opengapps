name: Build Open GApps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3.2.2
      with:
        cmdline-tools-version: 'latest'
        packages: 'build-tools;30.0.3 platform-tools'
        accept-android-sdk-licenses: true

    - name: Install Android SDK Tools
      run: |
        sdkmanager --install "platform-tools" "build-tools;30.0.3"
        echo "$ANDROID_HOME/build-tools/30.0.3" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
        # Make sure the tools are executable
        chmod +x $ANDROID_HOME/build-tools/30.0.3/*
        chmod +x $ANDROID_HOME/platform-tools/*

    - name: Verify Android tools installation
      run: |
        ls -l $ANDROID_HOME/build-tools/30.0.3/
        ls -l $ANDROID_HOME/platform-tools/
        echo "PATH=$PATH"
        $ANDROID_HOME/build-tools/30.0.3/aapt version
        $ANDROID_HOME/build-tools/30.0.3/zipalign -v
        $ANDROID_HOME/build-tools/30.0.3/apksigner --version

    - name: Sync submodules
      run: |
        git submodule update --init --recursive
        ./download_sources.sh --shallow

    - name: Build Open GApps
      run: make
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        PATH: ${{ env.ANDROID_HOME }}/build-tools/30.0.3:${{ env.ANDROID_HOME }}/platform-tools:${{ env.PATH }}

    - name: Archive build artifacts
      uses: actions/upload-artifact@v4.5.0
      with:
        name: open-gapps
        path: out/
