name: Windows Workflow

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download and Install Git
        run: |
          Invoke-WebRequest -Uri https://github.com/git-for-windows/git/releases/download/v2.47.1.windows.1/PortableGit-2.47.1-64-bit.7z.exe -OutFile PortableGit.7z.exe
          7z x PortableGit.7z.exe -oC:\PortableGit
          setx PATH "%PATH%;C:\PortableGit\cmd"
          setx PATH "%PATH%;C:\PortableGit\mingw64\bin"
          setx PATH "%PATH%;C:\PortableGit\usr\bin"

      - name: Verify Git Installation
        run: C:\PortableGit\cmd\git.exe --version

      - name: Set up Git
        run: C:\PortableGit\cmd\git.exe config --global core.autocrlf false

      - name: Install MSYS2 and Dependencies
        run: |
          Invoke-WebRequest -Uri https://github.com/msys2/msys2-installer/releases/download/2022-01-18/msys2-x86_64-20220118.exe -OutFile msys2.exe
          Start-Process msys2.exe -ArgumentList '--root C:\msys64 --script msys2.ini'

      - name: Update MSYS2 and install bc
        run: |
          C:\msys64\usr\bin\bash.exe -lc "pacman -Sy --noconfirm"
          C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm bc"

      - name: Run Shell Script
        run: |
          C:\PortableGit\usr\bin\bash.exe -c "C:/PortableGit/cmd/git.exe lfs install"
          C:\PortableGit\usr\bin\bash.exe -c "./download_sources.sh --shallow arm"

      - name: Run Makefile
        run: C:\PortableGit\usr\bin\bash.exe -c "make arm-23"
